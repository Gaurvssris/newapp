<!DOCTYPE html>
<html>

<head>

<title>June 26</title>

<style>

body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(45deg,#ff416c,#ff4b2b,#1fa2ff);

background-size:400%;

animation:bg 10s infinite;

font-family:Arial;

}

@keyframes bg{

0%{background-position:0%}

50%{background-position:100%}

100%{background-position:0%}

}

.card{

background:white;

padding:50px;

border-radius:20px;

box-shadow:0 0 30px black;

text-align:center;

}

h1{

font-size:70px;

color:red;

animation:zoom 2s infinite;

}

@keyframes zoom{

50%{

transform:scale(1.2);

}

}

</style>

</head>

<body>

<div class="card">

<h2>Today</h2>

<h1>26 June</h1>

<h3>Friday</h3>

</div>

</body>

</html>
